name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 7 * * *'  # daily at 07:00 UTC (for nightly integration job)

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest -v --ignore=tests/integration
      - name: Smoke test CLI
        run: michelangelo generate --help

  nightly-integration:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Cache rembg model
        uses: actions/cache@v4
        with:
          path: ~/.u2net
          key: u2net-v1
      - run: pip install -e ".[dev,smart]"
      - run: pytest -v tests/integration
