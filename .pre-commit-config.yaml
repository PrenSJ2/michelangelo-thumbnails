repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: cli-help-smoke
        name: CLI --help smoke
        entry: michelangelo generate --help
        language: system
        pass_filenames: false
